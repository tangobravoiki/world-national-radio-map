<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌍 World Radio Map</title> 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;color:#fff;height:100vh;display:flex;flex-direction:column}
#header{background:#222;padding:15px;border-bottom:2px solid #444;text-align:center}
#header h1{font-size:1.5rem;color:#4a9eff}
#map{flex:1}
#player{background:#222;padding:12px;border-top:2px solid #444;display:none}
#player.show{display:block}
audio{width:100%;max-width:600px;display:block;margin:10px auto}
#info{text-align:center;margin-bottom:10px;color:#aaa}
</style>
</head>
<body>
<div id="header">
<h1>🌍 World National Radio Map</h1>
<p>Click markers to listen to national radio stations</p>
</div>
<div id="map"></div>
<div id="player">
<div id="info">—</div>
<audio id="audio" controls></audio>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);
const countries={
TR:{name:"Turkey",lat:39,lng:35},
US:{name:"USA",lat:37,-95},
GB:{name:"UK",lat:54,-2},
DE:{name:"Germany",lat:51,lng:10},
FR:{name:"France",lat:46,lng:2},
IT:{name:"Italy",lat:42,lng:12},
ES:{name:"Spain",lat:40,lng:-4},
BR:{name:"Brazil",lat:-14,lng:-52},
JP:{name:"Japan",lat:36,lng:138},
IN:{name:"India",lat:21,lng:78},
CA:{name:"Canada",lat:56,lng:-106},
AU:{name:"Australia",lat:-25,lng:134}
};
async function getStations(code){
try{
const r=await fetch(`https://de1.api.radio-browser.info/json/stations/bycountrycodeexact/${code}?limit=100&hidebroken=true&order=votes&reverse=true`);
const all=await r.json();return code==='TR'?all:all.filter(s=>s.tags&&(s.tags.toLowerCase().includes('news')||s.tags.toLowerCase().includes('talk')))}catch(e){return[]}m.on('click',async()=>{
async function getStations(code){try{const r=await fetch(`https://de1.api.radio-browser.info/json/stations/bycountrycodeexact/${code}?limit=100&hidebroken=true&order=votes&reverse=true`);const all=await r.json();return code==='TR'?all:all.filter(s=>s.tags&&(s.tags.toLowerCase().includes('news')||s.tags.toLowerCase().includes('talk')))}catch(e){return[]}}html+='<div style="max-height:150px;overflow-y:auto">';
stations.slice(0,8).forEach(s=>{
html+=`<div style="cursor:pointer;padding:4px;border-bottom:1px solid #ddd" onclick="playRadio('${s.url_resolved}','${s.name.replace(/'/g,"\\'")}')">${s.name}</div>`;
});
html+='</div>';
}else{
html+='No stations found';
}
m.bindPopup(html,{maxWidth:300}).openPopup();
});
}
function playRadio(url,name){
document.getElementById('audio').src=url;
document.getElementById('info').textContent=name;
document.getElementById('player').classList.add('show');
}
</script>
</body>
</html>
